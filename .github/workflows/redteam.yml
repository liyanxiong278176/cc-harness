name: cc-harness security eval

on:
  pull_request:
    paths:
      - 'eval/promptfoo/**'
      - 'cc_harness/**'
      - 'main.py'
      - '.github/workflows/redteam.yml'
  # schedule cron DISABLED — was eating GitHub Actions free tier minutes
  # (4 OWASP plugins × 256 probes ≈ 100 min/day → 3000 min/month > 2000 cap).
  # Re-enable by uncommenting the block below AND verifying quota allows.
  #
  # schedule:
  #   - cron: '0 2 * * *'
  workflow_dispatch:

# Cancel previous runs on the same PR — only the latest matters.
concurrency:
  group: security-${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'nightly' }}
  cancel-in-progress: true

jobs:
  # Job 1: hand-written + dynamic attacks (promptfoo eval). Fast (~5-10 min).
  # Runs FIRST in the serial chain (redteam needs: [eval] after this). Its
  # expected non-zero exit (promptfoo 100 on any failed probe) does NOT block
  # redteam, which runs under if: always().
  # Job timeout at 360min (GitHub max) so a few pathological probes (per-test
  # 5min cap) don't burn the entire budget. Average probe ~35s.
  eval:
    name: Eval (hand-written + dynamic)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      actions: write          # setup-python/setup-node cache 写(actions cache API)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install cc-harness deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dlp]'      # [dlp]=presidio-analyzer, 让 pii-exfil 计入 L5 ASR

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: eval/promptfoo/package-lock.json

      - name: Install promptfoo
        working-directory: eval/promptfoo
        run: npm ci

      - name: Clear promptfoo state
        run: rm -rf ~/.promptfoo
        continue-on-error: true

      - name: Verify PII layer (presidio usable)
        run: |
          python -c "from cc_harness.l5 import _maybe_build_pii_layer; from cc_harness.config import L5Config; \
          assert _maybe_build_pii_layer(L5Config()) is not None, \
          'presidio init failed — pii-exfil 会假阴性不计 L5 ASR'"

      - name: Build runtime env (no PROMPTFOO_API_KEY needed for eval)
        working-directory: eval/promptfoo
        run: |
          {
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_BASE_URL=https://api.deepseek.com/v1"
            echo "OPENAI_MODEL=deepseek-v4-flash"
            echo "JUDGE_MODEL=deepseek-v4-flash"
            echo "EMBEDDING_BASE_URL=https://api.siliconflow.cn/v1"
            echo "EMBEDDING_API_KEY=${{ secrets.EMBEDDING_API_KEY }}"
            echo "EMBEDDING_MODEL=BAAI/bge-m3"
            echo "EMBEDDING_DIM=1024"
            echo "PROMPTFOO_CACHE_TYPE=memory"
          } > .env.ci

      # Debug step: confirms wrapper can find main.py in CI checkout.
      # If this ever shows MISSING, the wrapper's fallback path search
      # (eval/promptfoo/wrappers/cc_harness.py) needs to look harder.
      - name: Debug repo state
        run: |
          pwd
          ls -la main.py 2>&1 || echo "MISSING"
          ls -la eval/promptfoo/wrappers/cc_harness.py

      - name: Generate dynamic attacks
        working-directory: eval/promptfoo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://api.deepseek.com/v1
          OPENAI_MODEL: deepseek-v4-flash
          EMBEDDING_BASE_URL: https://api.siliconflow.cn/v1
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL: BAAI/bge-m3
          EMBEDDING_DIM: "1024"
        run: |
          set -euo pipefail
          python tools/generate_attacks.py --per-cat 3

      - name: Run security eval
        working-directory: eval/promptfoo
        run: |
          set -euo pipefail
          # STRICT mode: promptfoo exits 100 when ANY probe fails — and in
          # red-team, failed probes ARE real breakthroughs. Let that exit code
          # propagate so the check goes RED on breakthroughs (blocks merge until
          # the vuln is fixed). The result JSON is written before exit, so the
          # upload step (if: always) + PR comment still report what broke.
          # To go back to "green despite breakthroughs", re-add `|| true` + `test -s`.
          npx promptfoo eval \
            -c promptfooconfig.security.yaml \
            --env-path .env.ci \
            -o eval-results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval/promptfoo/eval-results.json
          if-no-files-found: warn

  # Job 2: OWASP plugin attacks (promptfoo redteam run + eval). Slow (~30-60 min).
  # SERIALIZED after eval (needs: [eval]) — NOT parallel. Both jobs share one
  # DeepSeek API secret; parallel = 8 concurrent probes vs one account quota →
  # 429 risk, and cc-harness has no 429 backoff, so a rate-limit would fail
  # probes outright and randomly block merges. Serial keeps total concurrency
  # at 4. Trade-off: wall-clock is sum instead of max (~+10 min).
  # if: always() is REQUIRED: promptfoo exits 100 whenever ANY probe fails,
  # and red-team runs legitimately have failed probes (real breakthroughs), so
  # eval's expected non-zero exit must NOT skip redteam.
  redteam:
    name: Redteam (OWASP)
    needs: [eval]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 360     # GitHub max — OWASP plugin probes can be slow
    permissions:
      contents: read
      actions: write          # setup-python/setup-node cache 写(actions cache API)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install cc-harness deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dlp]'      # [dlp]=presidio-analyzer, 让 pii-exfil 计入 L5 ASR

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: eval/promptfoo/package-lock.json

      - name: Install promptfoo
        working-directory: eval/promptfoo
        run: npm ci

      - name: Clear promptfoo state
        run: rm -rf ~/.promptfoo
        continue-on-error: true

      - name: Build runtime env (with PROMPTFOO_API_KEY for OWASP)
        working-directory: eval/promptfoo
        run: |
          {
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_BASE_URL=https://api.deepseek.com/v1"
            echo "OPENAI_MODEL=deepseek-v4-flash"
            echo "JUDGE_MODEL=deepseek-v4-flash"
            echo "EMBEDDING_BASE_URL=https://api.siliconflow.cn/v1"
            echo "EMBEDDING_API_KEY=${{ secrets.EMBEDDING_API_KEY }}"
            echo "EMBEDDING_MODEL=BAAI/bge-m3"
            echo "EMBEDDING_DIM=1024"
            echo "PROMPTFOO_CACHE_TYPE=memory"
            echo "PROMPTFOO_API_KEY=${{ secrets.PROMPTFOO_API_KEY }}"
          } > .env.ci

      - name: Debug repo state
        run: |
          pwd
          ls -la main.py 2>&1 || echo "MISSING"
          ls -la eval/promptfoo/wrappers/cc_harness.py

      - name: Generate OWASP attacks
        working-directory: eval/promptfoo
        env:
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
        run: |
          set -euo pipefail
          # Step 1: 只生成测试用例 YAML(不 eval,避免和下一步重复)。
          # 之前用 redteam run 会内部跑一遍 eval + 写缓存,导致后面
          # `promptfoo eval` 直接读缓存返回 0 个测试 — PR comment 显示 OWASP=0。
          #
          # Retry:DeepSeek 生成攻击偶发返回非合法 YAML(promptfoo 默认 GPT-5.5
          # 更稳,换 DeepSeek 省钱的代价;实测 persistence plugin 触发过
          # "LLM returned invalid YAML" → exit 1)。bash 重试兜底:每次重新采样
          # (temperature>0),单次解析失败不阻塞。仍失败则 cat 错误转储后 exit 1
          # (STRICT:真失败仍红,提示生成阶段需修)。
          MAX=3
          for attempt in $(seq 1 "$MAX"); do
            echo "Generate attempt $attempt/$MAX..."
            if npx promptfoo redteam generate \
              -c promptfooconfig.redteam.yaml \
              --env-path .env.ci \
              -o redteam.yaml; then
              echo "Generate succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -lt "$MAX" ]; then
              echo "Generate failed (likely LLM YAML parse),retry in 10s..."
              sleep 10
            else
              echo "Generate failed after $MAX attempts. Parse-error dumps:"
              cat llm_parse_error_*.txt 2>/dev/null || echo "(no llm_parse_error_*.txt)"
              exit 1
            fi
          done

      - name: Run OWASP probes
        working-directory: eval/promptfoo
        env:
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
        run: |
          set -euo pipefail
          # Step 2: 用 `redteam eval` 跑生成的 YAML,结果输出为 JSON。
          # redteam eval 是 redteam 专用的 eval 子命令,会正确写入 JSON。
          # STRICT: exit 100(OWASP 突破 = 失败 probe)→ check 红,阻塞合并
          # 直到修防护。JSON 仍在退出前写入,PR 评论照常报告突破详情。
          # -j 1: 完全串行(默认 4)。OWASP 段并发时 agent boot fork MCP 子进程
          # 争抢 CI 2 核资源 → 59/121 boot 崩(rc=1, eval/bug/6)。串行(一次一个
          # agent)从根上消除争抢,boot 不再崩。代价:慢(~4h,121 probe × ~120s),
          # 但 360min job 够。boot 重试保留作偶发防御(单 agent boot 仍可能偶发失败)。
          npx promptfoo redteam eval \
            -c redteam.yaml \
            --env-path .env.ci \
            -j 1 \
            -o owasp-results.json

      - name: Upload redteam results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-results
          path: eval/promptfoo/owasp-results.json
          if-no-files-found: warn

  # Job 2.5: allow 模式沙箱红队(L8,spec §6.2)。串 redteam 后(共享 DeepSeek key
  # 防并 429)。不进 required checks(L8 边界 deferred:secret-file/.env mount、
  # network-egress 未 wire,hold 不住是观察值非回归,不卡合并)。
  # allow 模式:wrapper 注 AUTOCONFIRM=always(命令进沙箱)+ SANDBOX_FALLBACK=hard(挂不降级)。
  allow:
    name: Sandbox isolation (allow, L8)
    needs: [redteam]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 45        # 30 probe 串行 ~25min + 镜像 build ~5min,45 留余量
    permissions:
      contents: read
      actions: write            # buildx gha cache + setup-python/node cache 写
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install cc-harness + sandbox SDK + dlp
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[sandbox,dlp]'

      - uses: docker/setup-buildx-action@v3

      - name: Build sandbox image (layer cache)
        uses: docker/build-push-action@v5
        with:
          context: sandboxes
          load: true
          tags: cc-harness-runtime:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: eval/promptfoo/package-lock.json

      - name: Install promptfoo
        working-directory: eval/promptfoo
        run: npm ci

      - name: Verify image + sandbox SDK
        run: |
          docker images cc-harness-runtime:local
          python -c "from cc_harness.sandbox import _HAS_SANDBOX_SDK; assert _HAS_SANDBOX_SDK"

      - name: Build runtime env (DeepSeek key only — 执行类不需 OWASP/embedding)
        working-directory: eval/promptfoo
        run: |
          {
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_BASE_URL=https://api.deepseek.com/v1"
            echo "OPENAI_MODEL=deepseek-v4-flash"
            echo "JUDGE_MODEL=deepseek-v4-flash"
            echo "PROMPTFOO_CACHE_TYPE=memory"
          } > .env.ci

      - name: Run allow-mode sandbox redteam (L8)
        working-directory: eval/promptfoo
        run: |
          set -uo pipefail
          # 非 STRICT:执行类 hold 不住是已知边界(.env mount / egress 未 wire),
          # exit 100 不阻塞(本 job 不卡合并)。结果 JSON 已写出。
          # -j 1 串行:OWASP 段曾并发 boot 崩(redteam 沙箱同理),沙箱 cold-start
          # + 4 并发争 CI 2 核 → OOM/崩。串行稳(~25min)。
          npx promptfoo eval \
            -c promptfooconfig.security-allow.yaml \
            --env-path .env.ci \
            -j 1 \
            -o allow-results.json || echo "allow eval had failures (expected — L8 边界)"

      - name: Upload allow results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allow-results
          path: eval/promptfoo/allow-results.json
          if-no-files-found: warn

  # Job 3: Post PR comment. Depends on eval + redteam + allow (so all artifacts
  # available). Runs even if upstream failed (if: always()) so PR still gets a comment.
  comment:
    name: Post PR comment
    needs: [eval, redteam, allow]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
      actions: write          # setup-python cache:pip 写
    steps:
      - uses: actions/checkout@v4

      - name: Download eval results
        uses: actions/download-artifact@v4
        with:
          name: eval-results
          path: eval-artifacts/
        continue-on-error: true

      - name: Download redteam results
        uses: actions/download-artifact@v4
        with:
          name: owasp-results
          path: owasp-artifacts/
        continue-on-error: true

      - name: Download allow results
        uses: actions/download-artifact@v4
        with:
          name: allow-results
          path: allow-artifacts/
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Generate report.md + pr-comment.md
        # Classification lives ONLY in eval/promptfoo/tools/report_to_md.py
        # (single source of truth — no JS/Python split). The || fallback
        # keeps the comment job green if an artifact is missing.
        run: |
          pip install -e .
          python eval/promptfoo/tools/report_to_md.py \
            eval-artifacts/eval-results.json \
            owasp-artifacts/owasp-results.json \
            allow-artifacts/allow-results.json \
            -o report.md \
            --comment-out pr-comment.md || echo "report gen failed (artifact missing?)"

      - name: Severity gate
        # critical 真实突破 > 0 or high ASR > 10% -> exit 1 (blocks merge).
        # artifact 缺失时 report_to_md main() 跳过 gate 的 JSON 读取异常,
        # severity_gate 跑在空 list -> exit 0,不误红。step 红即真实突破。
        run: |
          python eval/promptfoo/tools/report_to_md.py \
            eval-artifacts/eval-results.json \
            owasp-artifacts/owasp-results.json \
            allow-artifacts/allow-results.json \
            --gate

      - name: Upload report.md
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-md
          path: report.md
          if-no-files-found: warn

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('pr-comment.md')
              ? fs.readFileSync('pr-comment.md', 'utf8')
              : '## 🛡️ cc-harness Security Eval\n\n⚠️ pr-comment.md was not generated — check the "Generate report.md + pr-comment.md" step logs.';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body
            });

# ----------------------------------------------------------------------
# To complete the CI gate (one-time setup per repo, do it in GitHub UI):
#
#   1. Push this file to GitHub (e.g. `git push origin 2-memory`).
#
#   2. Repo → Settings → Branches → Add/Edit rule for `master` (and any
#      other protected branch):
#        ✅ Require a pull request before merging
#        ✅ Require approvals (1+)
#        ✅ Require status checks to pass before merging
#        → Search and add: "Eval (hand-written + dynamic)"  (PR gate)
#        → Search and add: "Redteam (OWASP)"               (PR gate)
#        (Do NOT require "Post PR comment" — it's cosmetic.)
#
#      YELLOW-COLUMN CLEANUP: if an OLD "redteam" check is still listed
#      under Required status checks (left over from before this file was
#      split into 3 jobs), REMOVE it — keep only "Eval (hand-written +
#      dynamic)" and "Redteam (OWASP)". Go to Settings → Branches → edit
#      the rule → Required status checks → delete the stale "redteam"
#      entry. Stale checks that no longer run block the PR indefinitely.
#
#   3. Repo → Settings → Secrets and variables → Actions:
#        OPENAI_API_KEY     (DeepSeek key)
#        EMBEDDING_API_KEY  (SiliconFlow key for the memory system env)
#        PROMPTFOO_API_KEY  (promptfoo cloud — required for OWASP plugins
#                            owasp:llm:01/06/07/09. Free tier 10k probes/month)
#
#   4. Open a test PR that touches eval/promptfoo/** to confirm the
#      workflow fires and the checks show up in the PR's status list.
# ----------------------------------------------------------------------
