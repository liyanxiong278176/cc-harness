name: cc-harness security eval

# ⚠️ RETIRED 2026-07-06 ⚠️
#
# 红队已从 CI 改成本地:LOCAL 一键命令 `npm run redteam-all`(或 `python tools/run_eval.py unified`)。
# 原因:
#   - Actions free-tier 跑不起完整 unified config(OWASP 全 4 类 + coding-agent:all 13 件 + mcp,
#     串行 ~5-10h,远大于 360min 单 job 上限;并发 boot 又崩 2 核 runner)
#   - 之前尝试 `coding-agent:core` (5 件) 缩短 ~252min,贴上限零余量(cold-start 70min)
#   - 安全测试需要本地按需跑 + 人工 review LONG output,不适合 PR gate
#
# 本文件保留为 git history 档案,所有 jobs 已 stub。删 4 个老 config 详见 commit `c99539b` 之后。
#
# 恢复 CI 集成需要:
#   1. 重新设计一个 CI-only subset config(numTests: 1,排除展开过大的 `harmful`/MCP 多 sub-plugin 类)
#   2. 拆分多个并行 job(每个 ~120 probe,total ~10 min 串 / ~3 min 并)
#   3. 重写此 yml 的 jobs 块

on: []   # 不再触发。push / PR / schedule / dispatch 都关闭
concurrency:
  group: security-RETIRED
  cancel-in-progress: true

jobs:
  retired-2026-07-06:
    name: Redteam 集成已 deprecated,见文件 header
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "⚠️ 红队已 retired,改本地跑 \`npm run redteam-all\`"
          echo "本 yml 保留为 git history 档案,详见 header 注释"
