name: cc-harness security eval

on:
  pull_request:
    paths:
      - 'eval/promptfoo/**'
      - 'cc_harness/**'
      - 'main.py'
      - '.github/workflows/redteam.yml'

# Cancel previous runs on the same PR — only the latest matters.
concurrency:
  group: security-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  redteam:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # to post the summary comment
      contents: read
    timeout-minutes: 60      # 50 attacks × ~30s each + LLM judge calls

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install cc-harness deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install promptfoo
        working-directory: eval/promptfoo
        run: npm ci

      # Cache promptfoo's on-disk response cache (~/.promptfoo/cache).
      # Hashes the files that affect what the LLM is called with; change
      # those, the cache misses. Otherwise we restore from a previous run.
      - name: Cache promptfoo
        uses: actions/cache@v4
        with:
          path: ~/.promptfoo/cache
          key: ${{ runner.os }}-promptfoo-v2-${{ hashFiles('eval/promptfoo/wrappers/cc_harness.py', 'eval/promptfoo/promptfooconfig.security.yaml', 'eval/promptfoo/attacks.yaml', 'eval/promptfoo/judges/attack_held_ground.txt') }}
          restore-keys: |
            ${{ runner.os }}-promptfoo-v2-

      - name: Build runtime env
        working-directory: eval/promptfoo
        run: |
          {
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_BASE_URL=https://api.deepseek.com/v1"
            echo "OPENAI_MODEL=deepseek-v4-flash"
            # For llm-rubric judge
            echo "JUDGE_MODEL=deepseek-v4-flash"
            # Embedding (memory) — required by cc-harness config.py
            echo "EMBEDDING_BASE_URL=https://api.siliconflow.cn/v1"
            echo "EMBEDDING_API_KEY=${{ secrets.EMBEDDING_API_KEY }}"
            echo "EMBEDDING_MODEL=BAAI/bge-m3"
            echo "EMBEDDING_DIM=1024"
          } > .env.ci

      - name: Run security eval
        id: redteam
        working-directory: eval/promptfoo
        run: |
          npx promptfoo eval \
            -c promptfooconfig.security.yaml \
            --env-path .env.ci \
            -o security-results.json
        # NO `|| true` — workflow fails on any probe that breaks the agent.
        # Combined with branch protection "Require status checks", this
        # blocks the PR from merging.

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'eval/promptfoo/security-results.json';
            if (!fs.existsSync(path)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '## 🛡️ Security Eval\n\n⚠️ No `security-results.json` produced. Check the workflow logs.'
              });
              return;
            }
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            // promptfoo eval writes results into results.results[]. Each
            // test has a pass/fail plus per-assertion scores.
            const all = (data.results || []);
            const total = all.length;
            const pass = all.filter(r => r.success).length;
            const fail = total - pass;
            const rate = total ? (pass / total * 100).toFixed(1) : '0.0';
            const emoji = fail > 0 ? '🚨' : '✅';
            const failedList = all
              .filter(r => !r.success)
              .slice(0, 10)
              .map(r => `- **${(r.testCase?.description || '?').replace(/^[^#]+#\\d+\\s*—\\s*/, '')}** — score: ${(r.score || 0).toFixed(2)}`)
              .join('\n') || '_(none)_';
            const body = `## ${emoji} cc-harness Security Eval Results

            | Metric | Value |
            |---|---|
            | Attacks | ${total} |
            | Held ground (pass) | ${pass} |
            | Broke (fail) | **${fail}** |
            | Hold rate | ${rate}% |

            ${fail > 0 ? `### Failed probes (first 10)\n${failedList}\n\n⚠️ Some attacks succeeded — review the artifact.` : '🎉 All 50 attacks held — agent is robust.'}

            📎 Full per-attack results in the workflow artifact (\`security-output\`).`;

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-output
          path: eval/promptfoo/security-results.json
          if-no-files-found: warn

# ----------------------------------------------------------------------
# To complete the CI gate (one-time setup per repo, do it in GitHub UI):
#
#   1. Push this file to GitHub (e.g. `git push origin 2-memory`).
#
#   2. Repo → Settings → Branches → Add/Edit rule for `master` (and any
#      other protected branch):
#        ✅ Require a pull request before merging
#        ✅ Require approvals (1+)
#        ✅ Require status checks to pass before merging
#        ✅ Require branches to be up to date before merging
#        → Search and add: "redteam"  (the job name in this workflow)
#
#   3. Repo → Settings → Secrets and variables → Actions:
#        OPENAI_API_KEY     (DeepSeek key)
#        EMBEDDING_API_KEY  (SiliconFlow key for the memory system env)
#
#   4. Open a test PR that touches eval/promptfoo/** to confirm the
#      workflow fires and the check shows up in the PR's status list.
# ----------------------------------------------------------------------
