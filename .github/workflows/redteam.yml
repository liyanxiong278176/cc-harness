name: cc-harness security eval

on:
  pull_request:
    paths:
      - 'eval/promptfoo/**'
      - 'cc_harness/**'
      - 'main.py'
      - '.github/workflows/redteam.yml'
  # schedule cron DISABLED — was eating GitHub Actions free tier minutes
  # (4 OWASP plugins × 256 probes ≈ 100 min/day → 3000 min/month > 2000 cap).
  # Re-enable by uncommenting the block below AND verifying quota allows.
  #
  # schedule:
  #   - cron: '0 2 * * *'
  workflow_dispatch:

# Cancel previous runs on the same PR — only the latest matters.
concurrency:
  group: security-${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'nightly' }}
  cancel-in-progress: true

jobs:
  redteam:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # to post the summary comment
      contents: read
    timeout-minutes: 360     # GitHub max — eval + OWASP sequentially, ~100min each

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install cc-harness deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install promptfoo
        working-directory: eval/promptfoo
        run: npm ci

      # Clear promptfoo's state directory before each run.
      #
      # Why: promptfoo 0.121's internal SQLite schema (eval tracking,
      # telemetry) doesn't match what older versions created on disk.
      # On a fresh runner, promptfoo's first run will try to insert into
      # tables that don't exist yet → FOREIGN KEY constraint failure.
      #
      # We tried caching `~/.promptfoo/cache` and restoring it between
      # runs, but the restored schema conflicts with the current
      # binary. The simpler fix is: wipe state on every run. We lose
      # the cross-run API response cache (slower) but gain reliability.
      # Re-add caching once promptfoo's schema stabilizes.
      - name: Clear promptfoo state
        run: rm -rf ~/.promptfoo
        continue-on-error: true

      - name: Build runtime env
        working-directory: eval/promptfoo
        run: |
          {
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_BASE_URL=https://api.deepseek.com/v1"
            echo "OPENAI_MODEL=deepseek-v4-flash"
            # For llm-rubric judge
            echo "JUDGE_MODEL=deepseek-v4-flash"
            # Embedding (memory) — required by cc-harness config.py
            echo "EMBEDDING_BASE_URL=https://api.siliconflow.cn/v1"
            echo "EMBEDDING_API_KEY=${{ secrets.EMBEDDING_API_KEY }}"
            echo "EMBEDDING_MODEL=BAAI/bge-m3"
            echo "EMBEDDING_DIM=1024"
            # Use in-memory cache + eval tracking instead of disk SQLite.
            # promptfoo 0.121 has a bug in its eval-tracking drizzle schema
            # that throws FOREIGN KEY constraint failures on disk-backed
            # SQLite. In-memory mode skips the disk path entirely.
            # (Trade-off: no cross-run API response cache.)
            echo "PROMPTFOO_CACHE_TYPE=memory"
            # Required by OWASP plugins (owasp:llm:01/06/07/09) — see
            # promptfooconfig.security.yaml. Without it the 4 plugins
            # silently produce no probes.
            echo "PROMPTFOO_API_KEY=${{ secrets.PROMPTFOO_API_KEY }}"
          } > .env.ci

      # Debug step: confirms wrapper can find main.py in CI checkout.
      # If this ever shows MISSING, the wrapper's fallback path search
      # (eval/promptfoo/wrappers/cc_harness.py) needs to look harder.
      - name: Debug repo state
        run: |
          echo "--- pwd ---"
          pwd
          echo "--- repo root main.py ---"
          ls -la main.py 2>&1 || echo "MISSING"
          echo "--- wrapper exists ---"
          ls -la eval/promptfoo/wrappers/cc_harness.py
          echo "--- promptfoo version ---"
          npx promptfoo --version

      - name: Generate dynamic attacks
        id: generate
        working-directory: eval/promptfoo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://api.deepseek.com/v1
          OPENAI_MODEL: deepseek-v4-flash
          # Embedding (for downstream curate; generate itself doesn't need these,
          # but we set them for consistency with eval step)
          EMBEDDING_BASE_URL: https://api.siliconflow.cn/v1
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL: BAAI/bge-m3
          EMBEDDING_DIM: "1024"
        run: |
          set -euo pipefail
          python tools/generate_attacks.py --per-cat 3
        # NOTE: no continue-on-error. Generation failure fails the build.
        # Model resolution: --model > $OPENAI_MODEL > "deepseek-v4-pro".
        # We set OPENAI_MODEL=deepseek-v4-flash in env above so CI uses flash
        # (already proven in the eval step; pro is reserved for local dev).

      - name: Run security eval (hand-written + dynamic)
        id: eval_run
        working-directory: eval/promptfoo
        run: |
          set -euo pipefail
          echo "--- starting eval (hand-written + dynamic) ---"
          npx promptfoo eval \
            -c promptfooconfig.security.yaml \
            --env-path .env.ci \
            -o eval-results.json
        # NO `|| true` — workflow fails on any probe that breaks the agent.

      - name: Run security redteam (OWASP)
        id: redteam_run
        working-directory: eval/promptfoo
        env:
          # Pass secret explicitly so `redteam run` sees it in process env
          # (cloud-inference step reads process env directly, not --env-path).
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
        run: |
          set -euo pipefail
          echo "--- starting redteam (OWASP) ---"
          npx promptfoo redteam run \
            -c promptfooconfig.redteam.yaml \
            --env-path .env.ci \
            -o owasp-results.json
        # NO `|| true` — workflow fails on any probe that breaks the agent.

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read BOTH result files. Each is produced by a separate job
            // (eval + redteam) so either may be missing if its step failed.
            const evalPath = 'eval/promptfoo/eval-results.json';
            const owaspPath = 'eval/promptfoo/owasp-results.json';
            const readResults = (path) => {
              if (!fs.existsSync(path)) return [];
              try {
                const data = JSON.parse(fs.readFileSync(path, 'utf8'));
                return (data.results && data.results.results) || [];
              } catch (e) {
                return [];
              }
            };
            const all = [...readResults(evalPath), ...readResults(owaspPath)];

            if (all.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '## 🛡️ Security Eval\n\n⚠️ No `eval-results.json` or `owasp-results.json` produced. Check workflow logs.'
              });
              return;
            }

            // Severity defaults — kept in sync with
            // eval/promptfoo/tools/generate_attacks.py CATEGORY_DEFAULT_SEVERITY
            const SEVERITY_DEFAULT = {
              "credential-exfil": "critical",
              "shell-injection": "critical",
              "excessive-agency": "high",
              "self-modification": "high",
              "fs-overreach": "high",
              "prompt-extraction": "medium",
              "hijacking": "low",
            };
            const SEVERITY_EMOJI = { critical: "🔴", high: "🟠", medium: "🟡", low: "🟢" };
            const SEVERITY_ORDER = ["critical", "high", "medium", "low"];

            const getSeverity = r =>
              r.testCase?.metadata?.severity
              || SEVERITY_DEFAULT[r.testCase?.metadata?.category]
              || "medium";

            // Classify each probe into one of 3 sources.
            // OWASP: promptfoo plugin (has pluginId)
            // Dynamic: local LLM-generated (has source: 'dynamic')
            // Static: hand-written (everything else)
            const classify = (r) => {
              const md = r.testCase?.metadata || {};
              if (md.pluginId) return 'owasp';
              if (md.source === 'dynamic') return 'dynamic';
              return 'static';
            };

            const stats = (arr) => ({
              total: arr.length,
              pass: arr.filter(r => r.success).length,
              fail: arr.filter(r => !r.success).length,
            });
            const buckets = {
              static: all.filter(r => classify(r) === 'static'),
              dynamic: all.filter(r => classify(r) === 'dynamic'),
              owasp: all.filter(r => classify(r) === 'owasp'),
            };
            const s = stats(buckets.static);
            const d = stats(buckets.dynamic);
            const o = stats(buckets.owasp);
            const total = s.total + d.total + o.total;
            const totalPass = s.pass + d.pass + o.pass;
            const totalFail = s.fail + d.fail + o.fail;
            const rate = total ? (totalPass / total * 100).toFixed(1) : '0.0';
            const sRate = s.total ? (s.pass / s.total * 100).toFixed(1) : '0.0';
            const dRate = d.total ? (d.pass / d.total * 100).toFixed(1) : '0.0';
            const oRate = o.total ? (o.pass / o.total * 100).toFixed(1) : '0.0';
            const emoji = totalFail > 0 ? '🚨' : '✅';

            // Build failed-section grouped by severity. Show error details
            // (truncated to first line, 80 chars) for each failed probe so
            // the PR comment is debuggable, not just "static ?".
            const failed = all.filter(r => !r.success).slice(0, 10);
            const bySeverity = {};
            for (const r of failed) {
              const sev = getSeverity(r);
              (bySeverity[sev] = bySeverity[sev] || []).push(r);
            }
            let failedSection = "";
            for (const sev of SEVERITY_ORDER) {
              const list = bySeverity[sev];
              if (!list || list.length === 0) continue;
              failedSection += `\n### ${SEVERITY_EMOJI[sev]} ${sev.toUpperCase()} (${list.length})\n`;
              for (const r of list) {
                const src = classify(r);
                const md = r.testCase?.metadata || {};
                const desc = (r.testCase?.description || md.pluginId || '?')
                  .replace(/^[^#]+#\d+\s*—\s*/, '');
                const err = (r.response?.error || '').split('\n')[0].slice(0, 80);
                const errTag = err ? ` — ❗ \`${err}\`` : '';
                failedSection += `- **${src}** ${desc} — score: ${(r.score || 0).toFixed(2)}${errTag}\n`;
              }
            }

            const body = [
              `## ${emoji} cc-harness Security Eval Results`,
              ``,
              `| Metric | Static | Dynamic | OWASP | Total |`,
              `|---|---|---|---|---|`,
              `| Attacks | ${s.total} | ${d.total} | ${o.total} | ${total} |`,
              `| Held ground (pass) | ${s.pass} | ${d.pass} | ${o.pass} | ${totalPass} |`,
              `| Broke (fail) | **${s.fail}** | **${d.fail}** | **${o.fail}** | **${totalFail}** |`,
              `| Hold rate | ${sRate}% | ${dRate}% | ${oRate}% | ${rate}% |`,
              ``,
              totalFail > 0
                ? `### Failed probes (grouped by severity)${failedSection}\n\n⚠️ Some attacks succeeded — review the artifact.`
                : `🎉 All attacks held — agent is robust.`,
              ``,
              `📎 Full per-attack results in the workflow artifact (\`security-output\`).`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-output
          path: |
            eval/promptfoo/eval-results.json
            eval/promptfoo/owasp-results.json
          if-no-files-found: warn

# ----------------------------------------------------------------------
# To complete the CI gate (one-time setup per repo, do it in GitHub UI):
#
#   1. Push this file to GitHub (e.g. `git push origin 2-memory`).
#
#   2. Repo → Settings → Branches → Add/Edit rule for `master` (and any
#      other protected branch):
#        ✅ Require a pull request before merging
#        ✅ Require approvals (1+)
#        ✅ Require status checks to pass before merging
#        ✅ Require branches to be up to date before merging
#        → Search and add: "redteam"  (the job name in this workflow)
#
#   3. Repo → Settings → Secrets and variables → Actions:
#        OPENAI_API_KEY     (DeepSeek key)
#        EMBEDDING_API_KEY  (SiliconFlow key for the memory system env)
#        PROMPTFOO_API_KEY  (promptfoo cloud — required for OWASP plugins
#                            owasp:llm:01/06/07/09. Free tier 10k probes/month)
#
#   4. Open a test PR that touches eval/promptfoo/** to confirm the
#      workflow fires and the check shows up in the PR's status list.
# ----------------------------------------------------------------------
