name: cc-harness sandbox redteam (allow mode, L8)

# 测沙箱隔离(L8),spec §6.2 allow 模式。与 redteam.yml(deny 模式,门禁)互补。
# 不进 required checks:L8 边界是已知 deferred(secret-file-read / .env mount 内可读、
# network-egress / network_policy 未 wire)→ hold 不住是观察值,不是回归。本 workflow
# 出真实 L8 数据供观察,不卡合并。手动 + PR 触发(触 cc_harness/sandboxes/eval 改动)。
#
# allow 模式三件套(Phase 1+2 已落地):
#   - wrapper 注 CC_HARNESS_AUTOCONFIRM=always → confirm 短路 → 命令进沙箱
#   - wrapper 注 CC_HARNESS_SANDBOX_FALLBACK=hard → 沙箱挂不降级(防 L8 失真 + 防泄露 CI secret)
#   - judges/sandbox_isolation.txt 判沙箱 hold/broke(非 agent 姿态)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'eval/promptfoo/**'
      - 'cc_harness/**'
      - 'sandboxes/**'
      - 'main.py'
      - '.github/workflows/redteam-allow.yml'

concurrency:
  group: sandbox-allow-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  allow:
    name: Sandbox isolation (allow, L8)
    runs-on: ubuntu-latest
    timeout-minutes: 30        # 实测 ~15min(镜像 build cache + 8 probe),30 留余量
    permissions:
      contents: read
      pull-requests: write      # L8 摘要评论
      actions: write            # buildx gha cache + setup-python/node cache 写
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip                       # wheel 缓存跨 run 复用,省每次下载
          cache-dependency-path: pyproject.toml

      - name: Install cc-harness + sandbox SDK + dlp
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[sandbox,dlp]'   # opensandbox SDK + server + presidio

      # Docker 在 ubuntu-latest 预装;buildx + gha cache 让镜像 layer 跨 run 复用
      # (Dockerfile 不变 → 秒重建)。
      - uses: docker/setup-buildx-action@v3

      - name: Build sandbox image (layer cache)
        uses: docker/build-push-action@v5
        with:
          context: sandboxes
          load: true
          tags: cc-harness-runtime:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: eval/promptfoo/package-lock.json

      - name: Install promptfoo
        working-directory: eval/promptfoo
        run: npm ci

      - name: Verify image + sandbox SDK
        run: |
          docker images cc-harness-runtime:local
          python -c "from cc_harness.sandbox import _HAS_SANDBOX_SDK; \
          assert _HAS_SANDBOX_SDK, 'opensandbox SDK 未装'"

      # 只放 DeepSeek key(执行类不需 OWASP/embedding key;Phase 4 砍)。
      # 沙箱 hold 不住 egress 时最多泄 DeepSeek key(个人测试可接受/限额轮换)。
      - name: Build runtime env (DeepSeek key only)
        working-directory: eval/promptfoo
        run: |
          {
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_BASE_URL=https://api.deepseek.com/v1"
            echo "OPENAI_MODEL=deepseek-v4-flash"
            echo "JUDGE_MODEL=deepseek-v4-flash"
            echo "PROMPTFOO_CACHE_TYPE=memory"
          } > .env.ci

      - name: Run allow-mode sandbox redteam (L8)
        working-directory: eval/promptfoo
        run: |
          set -uo pipefail
          # 非 STRICT:执行类 hold 不住是已知边界(.env mount / egress 未 wire),
          # 不是回归 → exit 100 不阻塞(本 workflow 不卡合并)。结果 JSON 已写出。
          npx promptfoo eval \
            -c promptfooconfig.security-allow.yaml \
            --env-path .env.ci \
            -o allow-results.json || echo "allow eval had failures (expected — L8 边界)"

      - name: Generate L8 report
        working-directory: eval/promptfoo
        run: |
          python tools/report_to_md.py allow-results.json -o allow-report.md || echo "report gen failed"

      - name: Upload allow results + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-allow-results
          path: |
            eval/promptfoo/allow-results.json
            eval/promptfoo/allow-report.md
          if-no-files-found: warn

      - name: Post L8 PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const p = 'eval/promptfoo/allow-report.md';
            let body = '## 🐳 Sandbox Redteam (L8 allow mode)\n\n';
            body += '_allow 模式:命令进沙箱,测沙箱隔离。L8 边界已知 deferred(secret-file/egress),不卡合并,仅观察。_\n\n';
            if (fs.existsSync(p)) {
              body += fs.readFileSync(p, 'utf8').slice(0, 6000);
            } else {
              body += '⚠️ allow-report.md 未生成,看 artifact `sandbox-allow-results`';
            }
            body += '\n\n📎 完整数据(allow-results.json + report)见 artifact `sandbox-allow-results`';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body
            });
