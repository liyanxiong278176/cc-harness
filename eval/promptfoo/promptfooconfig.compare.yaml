# A/B/C prompt comparison for cc-harness.
#
# Goal: see which user-prompt phrasings produce the best agent output.
# The system prompt (cc-harness's coding/plan/design mode) stays fixed;
# we vary how the user *phrases* the same task.
#
# Run:   npm run compare
# View:  promptfoo view    (browser, side-by-side)
#
# The target is the cc-harness REPL via the custom Python provider in
# wrappers/cc_harness.py. Each test case spawns a fresh REPL — slow but
# isolated (no state bleed between cases).
prompts:
  - label: v1_terse
    raw: |
      {{task}}

  - label: v2_context
    raw: |
      我在 cc-harness 仓库根目录工作。

      任务背景：
      {{context}}

      具体要做的事：
      {{task}}

      请先简短说明思路，再动手。

  - label: v3_stepwise
    raw: |
      请按以下步骤完成（每步短输出）：

      任务：{{task}}
      仓库：cc-harness（Python 编码代理）
      上下文：{{context}}

      1. 列出你会用到的工具
      2. 说明计划
      3. 执行并报告结果
      4. 总结

providers:
  - id: file://wrappers/cc_harness.py
    label: cc-harness
    config:
      mode: coding
      timeout: 600000      # 10 minutes in ms (promptfoo uses ms, NOT seconds)
      boot_wait: 8

tests:
  - description: "列出仓库根目录文件"
    vars:
      task: 列出当前目录有哪些文件和文件夹
      context: 看看整体结构
    assert:
      - type: contains
        value: "main.py"
        weight: 1
      - type: contains
        value: "cc_harness"
        weight: 1
      - type: contains-any
        value: ["pyproject.toml", "README.md", "CLAUDE.md"]
        weight: 1

  - description: "读 main.py 总结入口做了什么"
    vars:
      task: 读 main.py 总结这个项目入口做了什么
      context: 不需要执行，只读代码理解
    assert:
      - type: contains
        value: "REPL"
        weight: 1
      - type: contains
        value: "MCP"
        weight: 1
      # Soft rubric — judge if the summary actually explained the entry point
      - type: llm-rubric
        value: |
          判断回答是否：1) 准确指出了 main.py 是 REPL 入口 2) 提到了 MCP 工具加载
          3) 提到了记忆系统初始化 4) 简洁（< 300 字）
          返回 JSON: {"score": 0.0-1.0, "reason": "..."}
        threshold: 0.7
        provider: "openai:chat:{{env.JUDGE_MODEL}}"
        weight: 3

  - description: "说明 cc-harness 有几种模式"
    vars:
      task: cc-harness 有几种工作模式？分别是干什么的？
      context: 看 repl.py 里的 mode 相关代码
    assert:
      - type: contains-all
        value: ["coding", "plan", "design"]
        weight: 2
      - type: llm-rubric
        value: |
          判断回答是否：1) 列出了全部 3 种模式 2) 简单说明了各自用途
          3) 简洁（< 200 字）
          返回 JSON: {"score": 0.0-1.0, "reason": "..."}
        threshold: 0.7
        provider: "openai:chat:{{env.JUDGE_MODEL}}"
        weight: 2

defaultTest:
  options:
    # Each test case is slow (REPL boot ~10s + turn ~20s), so don't fan out
    # beyond what the user can watch; concurrency 1 is fine for dev.
    runSerially: true

  assert:
    # Hard rule: response must be non-empty and not just error
    - type: python
      value: |
        out = context.get('output', '') or context.get('prompt', '')
        # If provider set an error key, fail
        provider_response = context.get('providerResponse') or {}
        err = provider_response.get('error')
        if err:
          return {'pass': False, 'score': 0, 'reason': f'provider error: {err[:100]}'}
        return len(out.strip()) > 20
      weight: 1
