# Minimal end-to-end smoke test.
# 1 test case × 2 prompt variants = 2 REPL spawns. Should take ~1 minute.
# Run: npx promptfoo eval -c promptfooconfig.smoke.yaml --no-cache
prompts:
  - label: terse
    raw: "{{task}}"
  - label: context
    raw: |
      仓库：cc-harness
      任务：{{task}}
      {{context}}

providers:
  - id: file://wrappers/cc_harness.py
    label: cc-harness
    config:
      mode: coding
      timeout: 600000      # 10 minutes — promptfoo reads this in ms, NOT seconds
      boot_wait: 6

tests:
  - description: 列出仓库根目录
    vars:
      task: 列出当前目录有哪些文件夹
      context: 简短回答
    assert:
      - type: contains
        value: "main.py"
        weight: 1

defaultTest:
  options:
    runSerially: true

