<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GSAP Draggable + Inertia demo: a card that can be dragged with inertia and snaps back on release.">
    <title>GSAP Draggable + Inertia</title>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Draggable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/InertiaPlugin.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1115;
            color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: min(90vw, 520px);
            height: min(70vh, 520px);
            border: 2px dashed #2c2f37;
            border-radius: 16px;
        }

        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 160px;
            height: 160px;
            margin: -80px 0 0 -80px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6ee7b7, #34d399);
            color: #0f1115;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            cursor: grab;
            user-select: none;
            box-shadow: 0 20px 40px -16px rgba(110, 231, 183, 0.5);
        }

        .card:active { cursor: grabbing; }

        .hint {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #6b6d75;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="card" id="card">Drag me</div>
        <div class="hint">Drag with inertia, release to snap back</div>
    </div>

    <script>
        // Plugin UMDs (Draggable.min.js, InertiaPlugin.min.js) self-register onto
        // window.gsap when loaded after the core UMD, so no registerPlugin() call
        // is needed in a CDN-based HTML demo. In an ESM project you'd need:
        //   import { Draggable } from "gsap/Draggable";
        //   import { InertiaPlugin } from "gsap/InertiaPlugin";
        //   gsap.registerPlugin(Draggable, InertiaPlugin);
        // And skipping the registerPlugin() call in that case makes `inertia: true`
        // fail silently — no console warning, so always register explicitly when in doubt.

        const card = document.getElementById("card");
        const container = document.getElementById("container");

        const drag = Draggable.create(card, {
            type: "x,y",
            bounds: container,
            edgeResistance: 0.6,    // rubber-band at the bounds
            inertia: true,
            onPress() {
                gsap.to(this.target, { scale: 1.05, duration: 0.15 });
            },
            onRelease() {
                // Snap back to the center on release
                gsap.to(this.target, {
                    x: 0,
                    y: 0,
                    scale: 1,
                    duration: 0.6,
                    ease: "back.out(1.4)",
                });
            },
        })[0];

        // Cleanup on page hide (e.g., embedded in SPA / iframe)
        window.addEventListener("pagehide", () => drag.kill());
    </script>
</body>
</html>
