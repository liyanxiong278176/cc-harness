<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GSAP Observer demo: full-viewport horizontal carousel driven by wheel/touch/pointer input.">
    <title>GSAP Observer — Horizontal Carousel</title>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Observer.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1115;
            color: #f5f5f7;
            overflow: hidden;       /* prevent vertical scroll — Observer drives motion */
        }

        .stage {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        .track {
            display: flex;
            gap: 24px;
            padding: 0 8vw;
            will-change: transform;
        }

        .slide {
            flex: 0 0 60vw;
            max-width: 720px;
            height: 60vh;
            max-height: 480px;
            border-radius: 16px;
            background: linear-gradient(135deg, #1d1f25, #2a2d35);
            border: 1px solid #2c2f37;
            display: flex;
            align-items: flex-end;
            padding: 24px;
            font-size: 24px;
            font-weight: 600;
        }

        .slide:nth-child(odd)  { background: linear-gradient(135deg, #1d1f25, #1e3a2c); }
        .slide:nth-child(even) { background: linear-gradient(135deg, #1d1f25, #3a281e); }

        .hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: #6b6d75;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stage">
        <div class="track" id="track">
            <div class="slide">Slide 01</div>
            <div class="slide">Slide 02</div>
            <div class="slide">Slide 03</div>
            <div class="slide">Slide 04</div>
            <div class="slide">Slide 05</div>
        </div>
    </div>
    <p class="hint">Scroll / swipe / drag to navigate</p>

    <script>
        const track   = document.getElementById("track");
        const slides  = gsap.utils.toArray(".slide");
        const slideW  = slides[0].getBoundingClientRect().width + 24; // width + gap
        const maxX    = 0;                                              // start
        const minX    = -(slides.length - 1) * slideW * 0.6;            // rough bound

        // Build the observer once
        const observer = Observer.create({
            target: window,
            type: "wheel,touch,pointer",
            preventDefault: true,
            onDown: () => moveBy(-slideW),   // swipe / wheel down -> next slide
            onUp:   () => moveBy(slideW),    // swipe / wheel up   -> prev slide
        });

        // Clamped tween so the track can't drift past its bounds
        function moveBy(delta) {
            const current = gsap.getProperty(track, "x") || 0;
            const target  = Math.max(minX, Math.min(maxX, current + delta));
            gsap.to(track, { x: target, duration: 0.5, ease: "power2.out" });
        }

        // Keyboard support, attached to the same input model
        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") moveBy(-slideW);
            if (e.key === "ArrowLeft")  moveBy(slideW);
        });

        // Cleanup: kill observer on page hide so it doesn't leak when embedded
        window.addEventListener("pagehide", () => observer.kill());
    </script>
</body>
</html>
