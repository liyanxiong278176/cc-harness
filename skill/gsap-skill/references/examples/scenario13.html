<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GSAP GSDevTools demo: a multi-step timeline with the visual scrubber UI for time-based debugging.">
    <title>GSAP GSDevTools — Timeline Scrubber</title>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/GSDevTools.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1115;
            color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 32px;
        }

        h1 {
            font-size: clamp(20px, 3vw, 28px);
            color: #b8b9bf;
            text-align: center;
        }

        .stage {
            position: relative;
            width: min(90vw, 720px);
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #0f1115;
            opacity: 0;        /* start hidden; timeline fades them in */
        }

        .a { background: #6ee7b7; }
        .b { background: #f472b6; }
        .c { background: #60a5fa; }

        .hint {
            color: #6b6d75;
            font-size: 13px;
            text-align: center;
            max-width: 520px;
        }

        .hint code {
            background: #1d1f25;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        button {
            background: #1d1f25;
            color: #f5f5f7;
            border: 1px solid #2c2f37;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>GSAP DevTools — drag the scrubber to step the timeline</h1>

    <div class="stage">
        <div class="box a" id="boxA">A</div>
        <div class="box b" id="boxB">B</div>
        <div class="box c" id="boxC">C</div>
    </div>

    <p class="hint">
        Press <code>`</code> (backtick) to toggle the GSDevTools panel.
        Use the play / pause / reverse buttons or the time slider to scrub.
        Click <strong>Replay</strong> below to restart the animation.
    </p>

    <button id="replay">Replay</button>

    <script>
        // Build a timeline with several distinct steps.
        // GSDevTools will let you scrub any of them.
        function buildTimeline() {
            const tl = gsap.timeline({
                id: "demo",                    // shown in the GSDevTools panel
                defaults: { duration: 0.6, ease: "power2.out" },
            });

            tl.from("#boxA", { y: 60, opacity: 0 })
              .from("#boxB", { x: -80, opacity: 0, scale: 0.5 }, "-=0.2")
              .from("#boxC", { x: 80,  opacity: 0, rotation: 180 }, "-=0.2")
              .to("#boxA", { y: -40, duration: 0.4, ease: "power1.inOut" }, "+=0.2")
              .to(["#boxA", "#boxB", "#boxC"], { y: 0, x: 0, scale: 1, rotation: 0, stagger: 0.1 })
              .to(".box", { y: 60, opacity: 0, duration: 0.4, stagger: 0.05 });

            return tl;
        }

        // Mount GSDevTools once and reuse across replays.
        // `animation` ties the UI to a specific timeline; omit it to auto-collect.
        GSDevTools.create({
            id: "demo-tools",
            animation: buildTimeline(),
            paused: true,            // start paused so the first paint shows initial state
            timeScale: 0.5,          // half-speed by default; useful for easing inspection
        });

        // Replay: rebuild the timeline and re-bind to GSDevTools
        document.getElementById("replay").addEventListener("click", () => {
            // Reset element transforms before rebuilding (so new "from" tweens start clean)
            gsap.set(".box", { clearProps: "all", opacity: 0 });
            // Easiest cross-version path: re-create the devtools instance.
            // In production, prefer `GSDevTools.getById("demo-tools")` and update its animation.
            const tools = GSDevTools.getById?.("demo-tools");
            if (tools) {
                tools.animation = buildTimeline();
                tools.seek(0);
                tools.play();
            } else {
                // Fallback for older builds: just trigger a fresh scrub
                buildTimeline();
            }
        });
    </script>
</body>
</html>
