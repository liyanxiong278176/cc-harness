<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GSAP DrawSVGPlugin demo: SVG paths drawn on load, on scroll, and reset on demand.">
    <title>GSAP DrawSVGPlugin</title>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/DrawSVGPlugin.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1115;
            color: #f5f5f7;
            min-height: 100vh;
        }

        .panel {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 24px;
            gap: 24px;
        }

        h1 {
            font-size: clamp(28px, 4vw, 40px);
            font-weight: 600;
            color: #b8b9bf;
        }

        /* SVG baseline */
        svg { display: block; }

        .accent { stroke: #6ee7b7; }
        .muted  { stroke: #f472b6; }
        .cool   { stroke: #60a5fa; }

        /* Non-scaling stroke keeps thickness constant under responsive sizing */
        .ns-stroke { vector-effect: non-scaling-stroke; }

        .controls { display: flex; gap: 12px; }

        button {
            background: #1d1f25;
            color: #f5f5f7;
            border: 1px solid #2c2f37;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover { background: #262932; }

        .scroll-hint { color: #6b6d75; font-size: 13px; }
    </style>
</head>
<body>
    <section class="panel">
        <h1>Draw on load</h1>
        <svg width="320" height="120" viewBox="0 0 320 120" fill="none">
            <!-- Logo-like wordmark as a single stroked path -->
            <path class="accent ns-stroke"
                  d="M20,80 L20,40 L60,40 L60,80 M40,40 L40,80 M80,40 L80,80 L120,80 L120,40 L80,40 M140,40 L180,40 M140,80 L180,80 M140,40 L140,80 M200,40 C200,40 240,40 240,60 C240,80 200,80 200,80 M200,40 L200,80 M260,40 L300,40 M260,40 L260,80 L300,80"
                  stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </section>

    <section class="panel">
        <h1>Draw a checkmark (range)</h1>
        <svg width="160" height="160" viewBox="0 0 160 160" fill="none">
            <path class="muted ns-stroke"
                  d="M30,80 L70,120 L140,40"
                  stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </section>

    <section class="panel">
        <h1>Draw on scroll</h1>
        <p class="scroll-hint">Scroll past this section to draw the route.</p>
        <svg width="480" height="200" viewBox="0 0 480 200" fill="none">
            <path class="cool ns-stroke"
                  id="route"
                  d="M20,100 C80,20 160,180 240,100 C320,20 400,180 460,100"
                  stroke-width="4" stroke-linecap="round" />
            <circle class="cool" id="dotA" cx="20"  cy="100" r="6" fill="currentColor" />
            <circle class="cool" id="dotB" cx="460" cy="100" r="6" fill="currentColor" />
        </svg>
    </section>

    <div class="controls" style="padding: 32px; display: flex; justify-content: center;">
        <button id="reset">Reset all</button>
    </div>

    <script>
        // 1) Wordmark draws on load
        gsap.from(".accent", { drawSVG: 0, duration: 1.6, ease: "power2.inOut" });

        // 2) Checkmark draws a middle range: 0%-0% -> 0%-100%
        gsap.fromTo(".muted",
            { drawSVG: "0% 0%" },
            { drawSVG: "0% 100%", duration: 1.2, delay: 0.2, ease: "power2.out" }
        );

        // 3) Route draws as you scroll into view
        gsap.fromTo("#route",
            { drawSVG: 0 },
            {
                drawSVG: "100%",
                ease: "none",
                scrollTrigger: { trigger: "#route", start: "top 80%", end: "bottom 30%", scrub: 0.6 },
            }
        );

        // Reset: explicit set to 0 (don't just kill — set, otherwise repeat starts mid-draw)
        document.getElementById("reset").addEventListener("click", () => {
            gsap.set(".accent, .muted, #route", { drawSVG: 0 });
            // re-run the on-load tweens for the first two
            gsap.from(".accent", { drawSVG: 0, duration: 1.6, ease: "power2.inOut" });
            gsap.fromTo(".muted", { drawSVG: "0% 0%" }, { drawSVG: "0% 100%", duration: 1.2, ease: "power2.out" });
            // ScrollTrigger-driven one updates on next scroll; nudge it
            ScrollTrigger.refresh();
        });
    </script>
</body>
</html>
