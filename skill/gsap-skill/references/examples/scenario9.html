<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GSAP TextPlugin and ScrambleTextPlugin demo: typewriter, scramble decode, and keyframed text sequences.">
    <title>GSAP Text & ScrambleText</title>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/TextPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrambleTextPlugin.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1115;
            color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }

        h1 {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 700;
            letter-spacing: -0.02em;
            min-height: 1.2em;       /* reserve space for long text */
        }

        .accent { color: #6ee7b7; }

        .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

        button {
            background: #1d1f25;
            color: #f5f5f7;
            border: 1px solid #2c2f37;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #262932; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1 id="heading" aria-live="polite">Hello world</h1>

    <div class="controls">
        <button data-mode="typewriter">Typewriter</button>
        <button data-mode="scramble">Scramble decode</button>
        <button data-mode="sequence">Multi-line sequence</button>
    </div>

    <script>
        const heading = document.getElementById("heading");
        const buttons = document.querySelectorAll("button");

        function setBusy(busy) {
            buttons.forEach((b) => (b.disabled = busy));
        }

        buttons.forEach((btn) => {
            btn.addEventListener("click", () => {
                const mode = btn.dataset.mode;
                setBusy(true);

                // Cancel any in-flight text tween so button mashing doesn't pile up
                gsap.killTweensOf(heading, "text,scrambleText");

                if (mode === "typewriter") {
                    gsap.to(heading, {
                        duration: 1.4,
                        text: "Welcome to GSAP",
                        ease: "none",
                        onComplete: () => setBusy(false),
                    });
                } else if (mode === "scramble") {
                    gsap.to(heading, {
                        duration: 1.6,
                        scrambleText: {
                            text: "DECODED",
                            chars: "01lowerCase*",
                            speed: 0.3,
                            revealDelay: 0.15,
                        },
                        onComplete: () => setBusy(false),
                    });
                } else if (mode === "sequence") {
                    // Stagger multiple replacements on a timeline
                    const tl = gsap.timeline({ onComplete: () => setBusy(false) });
                    tl.to(heading, { duration: 0.4, text: "Line one",  ease: "none" })
                      .to(heading, { duration: 0.4, text: "Line two",  ease: "none" }, "+=0.2")
                      .to(heading, { duration: 0.4, text: "Line three", ease: "none" }, "+=0.2")
                      .to(heading, { duration: 0.4, text: "Done",      ease: "none" }, "+=0.2");
                }
            });
        });
    </script>
</body>
</html>
